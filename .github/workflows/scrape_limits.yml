name: 自動更新 Gemini API 額度限制

on:
  schedule:
    # 每天凌晨 4:00 (UTC 4:00) 自動執行 (台灣時間中午 12:00)
    - cron: '0 4 * * *'
  workflow_dispatch: # 支援手動觸發執行

permissions:
  contents: write

jobs:
  scrape-limits:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝 Python 依賴庫
      run: |
        python -m pip install --upgrade pip
        pip install playwright beautifulsoup4

    - name: 安裝 Playwright 瀏覽器核心 (Chromium)
      run: |
        playwright install chromium

    - name: 執行 Playwright 爬蟲抓取額度數據
      env:
        GOOGLE_COOKIES: ${{ secrets.GOOGLE_COOKIES }}
      run: |
        # 執行 CLI 模式的自動爬蟲，這會自動從環境變數載入登入 Cookies
        python main.py --cli

    - name: 檢查檔案是否有變更並提交推送
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 檢查是否有產生的 JSON 或 CSV 變更
        git add gemini_rate_limits.json gemini_rate_limits.csv
        
        if git diff --staged --quiet; then
          echo "無資料變更，跳過提交。"
        else
          git commit -m "chore: 自動更新 Gemini API 費率限制額度數據 [skip ci]"
          git push origin main
        fi
